<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>xmuggle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>xmuggle</h1>
    <span id="count"></span>
    <div id="keys-area" style="margin-left:auto; display:flex; gap:12px; align-items:center;">
      <div id="api-key-section" style="display:none;">
        <button id="api-key-get" class="link-btn">Get API key</button>
        <input type="password" id="api-key-input" placeholder="Anthropic API key" spellcheck="false">
        <button id="api-key-save">Save</button>
      </div>
      <span id="api-status"></span>
      <div id="gh-token-section" style="display:none;">
        <input type="password" id="gh-token-input" placeholder="GitHub PAT" spellcheck="false">
        <button id="gh-token-save">Save</button>
      </div>
      <span id="gh-status"></span>
    </div>
  </header>
  <div id="projects-bar">
    <div id="project-tabs"></div>
    <button id="add-project" class="add-project-btn" title="Add project">+</button>
  </div>
  <div id="grid"></div>
  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
